<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תשלום מאובטח | Tal HaTil Empire</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;direction:rtl}.checkout-header{background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);border-bottom:2px solid #c9a84c;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}.checkout-header .logo{font-size:1.4rem;font-weight:900;color:#c9a84c;letter-spacing:2px;text-decoration:none}.secure-badge{color:#4caf50;font-size:.85rem;font-weight:600}.checkout-container{max-width:960px;margin:40px auto;padding:0 20px;display:grid;grid-template-columns:1fr 420px;gap:32px}.order-summary{background:linear-gradient(135deg,#111 0%,#161616 100%);border:1px solid #c9a84c33;border-radius:16px;padding:28px}.order-summary h2{font-size:1.5rem;margin-bottom:24px;color:#c9a84c}.order-item{display:flex;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid #c9a84c22}.order-total{font-size:1.3rem;font-weight:700;margin-top:20px;padding-top:20px;border-top:2px solid #c9a84c;color:#c9a84c}.form-group{margin-bottom:20px}.form-group label{display:block;margin-bottom:8px;font-weight:600;color:#c9a84c}.form-group input{width:100%;padding:12px;border:1px solid #c9a84c44;border-radius:8px;background:rgba(255,255,255,.05);color:#fff;font-size:1rem}.form-group input:focus{outline:none;border-color:#c9a84c;background:rgba(201,168,76,.1)}#paypal-button-container{margin-top:30px;min-height:150px}.back-link{color:#c9a84c;text-decoration:none;margin-top:20px;display:inline-block}#error-message{color:#ff6b6b;background:rgba(255,68,68,.12);border:1px solid rgba(255,68,68,.25);padding:15px;border-radius:8px;margin:20px 0;display:none;text-align:center}.loading-paypal{color:#c9a84c;text-align:center;padding:18px;border:1px dashed #c9a84c55;border-radius:8px}@media(max-width:768px){.checkout-container{grid-template-columns:1fr;margin-top:24px}.checkout-header{padding:14px}.checkout-header .logo{font-size:1rem}}
    </style>
</head>
<body>
    <div class="checkout-header"><a href="/" class="logo">👑 TAL HATIL EMPIRE</a><div class="secure-badge">🔒 תשלום מאובטח</div></div>
    <div class="checkout-container">
        <div>
            <h1 style="margin-bottom:30px">פרטי התשלום</h1>
            <div id="error-message" role="alert"></div>
            <div class="form-group"><label for="buyerName">שם מלא</label><input type="text" id="buyerName" autocomplete="name" required></div>
            <div class="form-group"><label for="buyerEmail">כתובת מייל</label><input type="email" id="buyerEmail" autocomplete="email" required></div>
            <div class="form-group"><label for="buyerPhone">טלפון</label><input type="tel" id="buyerPhone" autocomplete="tel" required></div>
            <div id="paypal-button-container"><div class="loading-paypal">טוען כפתורי תשלום...</div></div>
            <a href="/#shop" class="back-link">← חזרה לחנות</a>
        </div>
        <div class="order-summary">
            <h2>סיכום הזמנה</h2>
            <div class="order-item"><span>מוצר</span><span id="product-name-display">טוען...</span></div>
            <div class="order-item"><span>מחיר</span><span id="product-price-display">₪0</span></div>
            <div class="order-total"><div style="display:flex;justify-content:space-between"><span>סה"כ:</span><span id="total-price-display">₪0</span></div></div>
            <div style="margin-top:20px;padding:16px;background:rgba(76,175,80,.1);border-radius:8px;color:#4caf50;font-size:.9rem">🔒 תשלום מאובטח דרך PayPal</div>
        </div>
    </div>
<script>
const products={
 'test-1':{name:'Test Product (1₪)',price:1},'prompt-bible':{name:'The Prompt Bible',price:199},'auto-post':{name:'Auto-Post Engine',price:199},'script-master':{name:'AI Script Master',price:199},'reality-architect':{name:'The Reality Architect',price:199},'dropshipping':{name:'Dropshipping 2.0',price:499},'ecommerce-mastery':{name:'E-Commerce Mastery',price:799},'ai-bot-setup':{name:'Custom AI Bot Setup',price:1200},'automation-audit':{name:'Automation Audit',price:500},'vip':{name:'VIP Mentorship (Monthly)',price:1499},'consulting':{name:'Empire Consulting (1hr)',price:850}
};
const params=new URLSearchParams(location.search);const requested=params.get('product')||'prompt-bible';const productId=products[requested]?requested:'prompt-bible';const product=products[productId];
function money(n){return '₪'+Number(n).toLocaleString('he-IL')}
function showError(msg){const el=document.getElementById('error-message');el.innerText=msg;el.style.display='block'}
function clearError(){const el=document.getElementById('error-message');el.innerText='';el.style.display='none'}
function setSummary(){document.getElementById('product-name-display').innerText=product.name;document.getElementById('product-price-display').innerText=money(product.price);document.getElementById('total-price-display').innerText=money(product.price);document.title='תשלום עבור '+product.name+' | Tal HaTil Empire'}
function validBuyer(){const name=document.getElementById('buyerName').value.trim();const email=document.getElementById('buyerEmail').value.trim();const phone=document.getElementById('buyerPhone').value.trim();if(!name||!email||!phone){showError('אנא מלא שם, מייל וטלפון לפני התשלום');return false}if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showError('כתובת המייל אינה תקינה');return false}clearError();return true}
function loadPayPal(){const s=document.createElement('script');s.src='https://www.paypal.com/sdk/js?client-id=AZr8MsWIYQdVV3k24fRoQ2f1hS1vEGJky8EUhl_XVPpTRCKLdiaaTqKLkzIfGT6aICaRau9bH-FjFzyL&currency=ILS&disable-funding=credit,card';s.onload=renderPayPal;s.onerror=function(){document.getElementById('paypal-button-container').innerHTML='';showError('PayPal לא נטען. נסה לרענן את הדף או צור קשר במייל tal.derie.td@gmail.com')};document.body.appendChild(s)}
function renderPayPal(){const container=document.getElementById('paypal-button-container');if(!window.paypal||!paypal.Buttons){container.innerHTML='';showError('כפתורי התשלום לא זמינים כרגע');return}container.innerHTML='';paypal.Buttons({style:{layout:'vertical',color:'gold',shape:'rect',label:'paypal'},onClick:function(){return validBuyer()},createOrder:function(data,actions){if(!validBuyer())return Promise.reject(new Error('missing buyer details'));return actions.order.create({purchase_units:[{description:product.name,custom_id:productId,amount:{currency_code:'ILS',value:Number(product.price).toFixed(2)}}]})},onApprove:function(data,actions){return actions.order.capture().then(function(details){const buyer=encodeURIComponent(document.getElementById('buyerName').value.trim());location.href='success.html?orderId='+encodeURIComponent(details.id)+'&product='+encodeURIComponent(productId)+'&name='+buyer})},onCancel:function(){showError('התשלום בוטל')},onError:function(err){console.error(err);showError('שגיאה בחיבור ל-PayPal. נסה שוב או צור קשר במייל tal.derie.td@gmail.com')}}).render('#paypal-button-container').catch(function(err){console.error(err);showError('לא ניתן להציג את כפתורי התשלום כרגע')})}
setSummary();loadPayPal();
</script>
</body>
</html>
