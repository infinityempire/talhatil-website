<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תשלום מאובטח | Tal HaTil Empire</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; direction: rtl; }
        .checkout-header { background: linear-gradient(135deg, #111 0%, #1a1a1a 100%); border-bottom: 2px solid #c9a84c; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .checkout-header .logo { font-size: 1.4rem; font-weight: 900; color: #c9a84c; letter-spacing: 2px; text-decoration: none; }
        .secure-badge { display: flex; align-items: center; gap: 8px; color: #4caf50; font-size: 0.85rem; font-weight: 600; }
        .checkout-container { max-width: 960px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 420px; gap: 32px; }
        @media (max-width: 768px) { .checkout-container { grid-template-columns: 1fr; } }
        .order-summary { background: linear-gradient(135deg, #111 0%, #161616 100%); border: 1px solid #c9a84c33; border-radius: 16px; padding: 28px; }
        .order-summary h2 { font-size: 1.5rem; margin-bottom: 24px; color: #c9a84c; }
        .order-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #c9a84c22; }
        .order-item:last-child { border-bottom: none; }
        .order-total { font-size: 1.3rem; font-weight: 700; margin-top: 20px; padding-top: 20px; border-top: 2px solid #c9a84c; color: #c9a84c; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #c9a84c; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #c9a84c44; border-radius: 8px; background: rgba(255,255,255,0.05); color: #fff; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #c9a84c; background: rgba(201,168,76,0.1); }
        #paypal-button-container { margin-top: 30px; min-height: 150px; }
        .back-link { color: #c9a84c; text-decoration: none; margin-top: 20px; display: inline-block; }
        .back-link:hover { text-decoration: underline; }
        #error-message { color: #ff4444; background: rgba(255,68,68,0.1); padding: 15px; border-radius: 8px; margin-top: 20px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="checkout-header">
        <a href="/" class="logo">👑 TAL HATIL EMPIRE</a>
        <div class="secure-badge">
            <span>🔒 תשלום מאובטח</span>
        </div>
    </div>
    <div class="checkout-container">
        <div>
            <h1 style="margin-bottom: 30px;">פרטי התשלום</h1>
            <div id="error-message"></div>
            <div class="form-group">
                <label for="buyerName">שם מלא</label>
                <input type="text" id="buyerName" placeholder="הכנס את שמך המלא" required>
            </div>
            <div class="form-group">
                <label for="buyerEmail">כתובת מייל</label>
                <input type="email" id="buyerEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="buyerPhone">טלפון</label>
                <input type="tel" id="buyerPhone" placeholder="050-0000000" required>
            </div>
            <div id="paypal-button-container"></div>
            <a href="/" class="back-link">← חזרה לחנות</a>
        </div>
        <div class="order-summary">
            <h2>סיכום הזמנה</h2>
            <div class="order-item">
                <span>מוצר</span>
                <span id="product-name-display">טוען...</span>
            </div>
            <div class="order-item">
                <span>מחיר</span>
                <span id="product-price-display">₪0</span>
            </div>
            <div class="order-total">
                <div style="display: flex; justify-content: space-between;">
                    <span>סה"כ:</span>
                    <span id="total-price-display">₪0</span>
                </div>
            </div>
            <div style="margin-top: 20px; padding: 16px; background: rgba(76,175,80,0.1); border-radius: 8px; color: #4caf50; font-size: 0.9rem;">
                🔒 תשלום מאובטח דרך PayPal וכרטיסי אשראי
            </div>
        </div>
    </div>
    <script src="https://www.paypal.com/sdk/js?client-id=AZr8MsWIYQdVV3k24fRoQ2f1hS1vEGJky8EUhl_XVPpTRCKLdiaaTqKLkzIfGT6aICaRau9bH-FjFzyL&currency=ILS&disable-funding=credit,card"></script>
    <script>
        const products = {
            'test-1': { name: 'Test Product (1₪)', price: 1 },
            'prompt-bible': { name: 'The Prompt Bible', price: 199 },
            'auto-post': { name: 'Auto-Post Engine', price: 199 },
            'script-master': { name: 'AI Script Master', price: 199 },
            'reality-architect': { name: 'The Reality Architect', price: 199 },
            'dropshipping': { name: 'Dropshipping 2.0', price: 499 },
            'ecommerce-mastery': { name: 'E-Commerce Mastery', price: 799 },
            'ai-bot-setup': { name: 'Custom AI Bot Setup', price: 1200 },
            'automation-audit': { name: 'Automation Audit', price: 500 },
            'vip': { name: 'VIP Mentorship (Monthly)', price: 1499 },
            'consulting': { name: 'Empire Consulting (1hr)', price: 850 }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('product') || 'prompt-bible';
        const product = products[productId] || products['prompt-bible'];

        document.getElementById('product-name-display').innerText = product.name;
        document.getElementById('product-price-display').innerText = '₪' + product.price.toLocaleString();
        document.getElementById('total-price-display').innerText = '₪' + product.price.toLocaleString();

        function showError(msg) {
            const errDiv = document.getElementById('error-message');
            errDiv.innerText = msg;
            errDiv.style.display = 'block';
        }

        paypal.Buttons({
            style: {
                layout: 'vertical',
                color:  'gold',
                shape:  'rect',
                label:  'paypal'
            },
            createOrder: function(data, actions) {
                const name = document.getElementById('buyerName').value;
                const email = document.getElementById('buyerEmail').value;
                if (!name || !email) {
                    showError('אנא מלא שם ומייל לפני התשלום');
                    return;
                }
                return actions.order.create({
                    purchase_units: [{
                        description: product.name,
                        amount: { 
                            currency_code: 'ILS',
                            value: product.price.toString() + '.00' 
                        }
                    }]
                });
            },
            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    window.location.href = 'success.html?orderId=' + details.id + '&name=' + encodeURIComponent(details.payer.name.given_name);
                });
            },
            onCancel: function(data) {
                showError('התשלום בוטל');
            },
            onError: function(err) {
                console.error('PayPal Error:', err);
                showError('שגיאה בחיבור ל-PayPal. אנא נסה שוב או השתמש בדפדפן אחר.');
            }
        }).render('#paypal-button-container').catch(err => {
            console.error('Render Error:', err);
            showError('לא ניתן לטעון את כפתורי התשלום. בדוק את חיבור האינטרנט שלך.');
        });
    </script>
</body>
</html>
