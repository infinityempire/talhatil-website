<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>תשלום בוצע בהצלחה | Tal HaTil Empire</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Heebo', 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .success-container { text-align: center; max-width: 600px; padding: 40px; background: linear-gradient(135deg, #111 0%, #161616 100%); border: 1px solid rgba(76,175,80,0.3); border-radius: 16px; }
        .success-icon { font-size: 4em; margin-bottom: 20px; }
        h1 { font-size: 2.5em; color: #4caf50; margin-bottom: 20px; }
        p { font-size: 1.1em; color: #ccc; margin-bottom: 30px; }
        .order-id { background: rgba(76,175,80,0.1); padding: 20px; border-radius: 8px; margin: 20px 0; }
        .order-id label { color: #4caf50; font-weight: 600; }
        .order-id span { font-family: monospace; color: #fff; }
        .btn { background: linear-gradient(135deg, #ffcc00 0%, #ffb800 100%); color: #000; padding: 14px 30px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,204,0,0.3); }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        <h1>תשלום בוצע בהצלחה!</h1>
        <p>תודה על הרכישה שלך. הזמנתך עובדת ותקבל מייל אישור בקרוב.</p>
        
        <div class="order-id">
            <label>מספר הזמנה:</label><br>
            <span id="orderId">-</span>
        </div>

        <p style="font-size: 0.95em; color: #999;">יתכן שיקח עד 24 שעות לקבל את הגישה למוצר שלך.</p>

        <a href="/" class="btn">חזרה לעמוד הבית</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId') || 'N/A';
        document.getElementById('orderId').textContent = orderId;
    </script>
</body>
</html>
