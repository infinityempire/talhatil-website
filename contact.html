<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>צור קשר | Tal HaTil Empire</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: #000; color: #fff; font-family: 'Heebo', 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
        nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(0,0,0,0.95); border-bottom: 1px solid rgba(255,204,0,0.3); backdrop-filter: blur(10px); padding: 0 30px; display: flex; align-items: center; justify-content: space-between; height: 65px; }
        .nav-logo { font-size: 1.4em; font-weight: 900; color: #ffcc00; text-transform: uppercase; letter-spacing: 3px; text-decoration: none; }
        .nav-links { display: flex; gap: 5px; list-style: none; }
        .nav-links a { color: #ccc; text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 0.9em; font-weight: 700; transition: all 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #ffcc00; background: rgba(255,204,0,0.1); }
        .contact-container { max-width: 800px; margin: 120px auto 40px; padding: 0 20px; }
        .contact-header { text-align: center; margin-bottom: 40px; }
        .contact-header h1 { font-size: 2.5em; margin-bottom: 10px; color: #ffcc00; }
        .contact-header p { font-size: 1.1em; color: #ccc; }
        .contact-form { background: linear-gradient(135deg, #111 0%, #161616 100%); border: 1px solid rgba(255,204,0,0.2); border-radius: 12px; padding: 30px; margin-bottom: 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #ffcc00; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid rgba(255,204,0,0.3); border-radius: 6px; background: rgba(255,255,255,0.05); color: #fff; font-family: inherit; font-size: 1em; }
        .submit-btn { background: linear-gradient(135deg, #ffcc00 0%, #ffb800 100%); color: #000; padding: 14px 30px; border: none; border-radius: 6px; font-size: 1em; font-weight: 700; cursor: pointer; transition: all 0.3s; width: 100%; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">👑 TAL HATIL</a>
        <ul class="nav-links">
            <li><a href="/">בית</a></li>
            <li><a href="/#about">אודות</a></li>
            <li><a href="/#services">שירותים</a></li>
            <li><a href="/#shop">חנות</a></li>
            <li><a href="contact.html" class="active">צור קשר</a></li>
        </ul>
    </nav>
    <div class="contact-container">
        <div class="contact-header">
            <h1>צור קשר איתנו</h1>
            <p>יש לך שאלות? אנחנו כאן בשבילך.</p>
        </div>
        <form class="contact-form" onsubmit="handleSubmit(event)">
            <div class="form-group"><label for="name">שם מלא</label><input type="text" id="name" required></div>
            <div class="form-group"><label for="email">כתובת מייל</label><input type="email" id="email" required></div>
            <div class="form-group"><label for="phone">טלפון</label><input type="tel" id="phone"></div>
            <div class="form-group"><label for="message">הודעה</label><textarea id="message" rows="6" required></textarea></div>
            <button type="submit" class="submit-btn">שלח הודעה 🚀</button>
        </form>
    </div>
<script>
function handleSubmit(event){
 event.preventDefault();
 const name=document.getElementById('name').value;
 const email=document.getElementById('email').value;
 const phone=document.getElementById('phone').value;
 const message=document.getElementById('message').value;
 const body=`${message}\n\nשם: ${name}\nמייל: ${email}\nטלפון: ${phone}`;
 window.location.href=`mailto:tal.derie.td@gmail.com?subject=${encodeURIComponent('פנייה חדשה מהאתר')}&body=${encodeURIComponent(body)}`;
}
</script>
</body>
</html>
